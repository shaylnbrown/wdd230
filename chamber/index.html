<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shay Brown - WDD 230 - Discover Florissant Chamber of Commerce</title>
    

    <!-- CSS --> 
    <link rel="stylesheet" href="styles/normalize.css">   
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/medium.css">
    <link rel="stylesheet" href="styles/larger.css">
</head>
<body>
    <header id="header">
        <button id="menu"></button>
        <button id="darkMode">Dark<br>Mode</button>
        <img id="seal" src="images/city-seal.webp">
        <img id="title" src="images/site-title.webp">
    </header>
    <nav id="navigation">
        <a class="link" href="#">
            <img class="linkIcon" src="images/home.webp">
            <h2 class="linkText">Home</h2>
        </a>
        <a class="link" href="#">
            <img class="linkIcon" src="images/discover.webp">
            <h2 class="linkText">Discover</h2>
        </a>
        <a class="link" href="#">
            <img class="linkIcon" src="images/directory.webp">
            <h2 class="linkText">Directory</h2>
        </a>
        
    </nav>
    <main id="main">
        <div class="hero">
            <picture>
                <source srcset="images/hero-small.webp" media="(max-width: 750px)">
                <source srcset="images/hero-large.webp" media="(max-width: 1000px)">                
                <img id="pond" src="images/hero-large.webp" alt="St. Ferdinand Park" width="1500" height="443">
            </picture>
        </div>
        <section id="currentEvents">
            <h2>Current Events</h2>
        </section>
        <section id="weather">
            <h2 id="weatherInfo">Weather</h2>
        </section>
        <section id="spotlights">
            <h2>Spotlights</h2>
        </section>
        <a id="join" class="link" href="#">
            <img class="linkIcon" src="images/join.webp">
            <h2 class="linkText">Join</h2>
        </a>                
    </main>
    <footer id="footer">
        <h1 id="copyright">Shay Brown<br>Florissant, MO Chamber of Commerce</h1>
        <p id="lastModified"></p>
    </footer>
    <script src="scripts/code.js"></script>
    <script src="scripts/windchill.js"></script>
</body>
</html>
